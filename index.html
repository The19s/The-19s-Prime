<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Prime Consulting | Trusted Government Contracting</title>
    <meta name="description" content="Bridging the gap between government needs and commercial excellence.">
    <meta property="og:title" content="Prime Consulting">
    <meta property="og:description" content="Trusted Government Contracting & Commercial Partnerships.">
    <meta property="og:image" content="og-image.jpg"> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- THE STATESMAN COLOR PALETTE --- */
        :root {
            --bg-color: #0A192F; /* Deep Navy Blue */
            --text-main: #FFFFFF; /* Crisp White */
            --text-muted: #A8B2D1; /* Soft Grey/Blue */
            --accent-gold: #D4AF37; /* Rich Metallic Gold */
            --button-hover: #F3E5AB; /* Light Gold for Hover states */
        }

        /* Base Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        /* Profile Section */
        .profile-container {
            text-align: center;
            margin-bottom: 2rem;
            max-width: 600px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent-gold);
            object-fit: cover;
            margin-bottom: 1rem;
            background-color: #ffffff; /* Fallback if PNG is transparent */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .profile-title {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }

        .profile-bio {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.5;
            padding: 0 1rem;
        }

        /* Links Section */
        .links-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1rem;
            background-color: transparent;
            border: 2px solid var(--accent-gold);
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }

        .link-btn:hover {
            background-color: var(--accent-gold);
            color: var(--bg-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.2);
        }

        /* Footer */
        .footer {
            margin-top: auto;
            padding-top: 3rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="logo.png" alt="Prime Consulting Logo" class="profile-img">
        <h1 class="profile-title">Prime Consulting</h1>
        <p class="profile-bio">Bridging the gap between government needs and commercial excellence. Reliable solutions, seamlessly executed.</p>
    </div>

    <div class="links-container">
        <a href="URL_HERE" class="link-btn" target="_blank" rel="noopener noreferrer">📄 Our Capabilities Statement</a>
        <a href="URL_HERE" class="link-btn" target="_blank" rel="noopener noreferrer">🤝 Partner With Us</a>
        <a href="URL_HERE" class="link-btn" target="_blank" rel="noopener noreferrer">🏢 Past Performance</a>
        <a href="mailto:contact@the19sprime.com" class="link-btn">✉️ Contact Our Team</a>
    </div>

    <div class="footer">
        <p>&copy; 2026 Prime Consulting. All Rights Reserved.</p>
    </div>

</body>
</html>
